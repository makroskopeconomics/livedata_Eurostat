name: Update Eurostat CSVs (HICP + Debt)

on:
  schedule:
    - cron: "15 6 * * *"   # todos los días 06:15 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("eurostat","dplyr","tidyr","readr","lubridate"), repos="https://cloud.r-project.org")'

      - name: Run R scripts
        run: |
          Rscript scripts/update_hicp.R
          Rscript scripts/update_debt.R

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Auto-update Eurostat CSVs"
          git push
