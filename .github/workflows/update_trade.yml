name: Update trade data

on:
  workflow_dispatch:
  schedule:
    - cron: '15 6 5 * *'

permissions:
  contents: write

jobs:
  update-trade:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Set up R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::eurostat
            any::dplyr
            any::tidyr
            any::readr

      - name: Run trade script
        run: Rscript scripts/update_trade.R

      - name: Show generated files
        run: ls -lah

      - name: Commit and push updated CSV files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add trade_live_data.csv || true
          git add trade_exports_by_country.csv || true
          git add trade_imports_by_country.csv || true

          git diff --cached --quiet && echo "no changes" || git commit -m "update trade data files"
          git push
